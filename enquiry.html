<section class="hero">
    <h1>Enquiry Page</h1>
    <h2>We’re Here to Help You</h2>
    <p>Send us your enquiry and we will respond as soon as possible.</p>
</section>

<section class="enquiry-wrapper">

    <div class="enquiry-info">
        <h2>Why Contact Us?</h2>
        <p>
            We help you with product selection, pricing, and availability.
        </p>
    </div>

    <div class="enquiry-form">
        <form class="enquiryForm">

    <input type="text" id="name" name="from_name" placeholder="Full Name" >

    <input type="email" id="email" name="from_email" placeholder="Email Address" >

    <input type="tel" name="phone" placeholder="Phone Number">

    <input type="text" id="service" name="service" placeholder="Service Needed">

    <textarea name="message" id="message" rows="5" placeholder="Your Message" ></textarea>

    <button type="submit">Submit Enquiry</button>

</form>
        
    </div>

</section>
